<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Địa Lí 12</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8;
            --surface: #fffdf8;
            --surface2: #f0ebe0;
            --border: #d4c9b0;
            --text: #2c2416;
            --text-muted: #7a6e5c;
            --accent: #1a5c8a;
            --accent2: #b5401e;
            --green: #1a6b3c;
            --green-bg: #e8f5ed;
            --green-border: #6bbf8a;
            --red: #b5401e;
            --red-bg: #faeae6;
            --red-border: #e08060;
            --orange: #b56010;
            --orange-bg: #fef3e2;
            --orange-border: #e0a060;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Decorative header */
        .page-header {
            background: var(--accent);
            color: white;
            padding: 2.5rem 1.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 20px,
                    rgba(255, 255, 255, 0.04) 20px,
                    rgba(255, 255, 255, 0.04) 40px);
        }

        .page-header h1 {
            font-family: 'Merriweather', serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            position: relative;
        }

        .page-header p {
            margin-top: 0.5rem;
            opacity: 0.8;
            font-size: 0.9rem;
            position: relative;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1rem 6rem;
        }

        /* Section heading */
        .section-title {
            font-family: 'Merriweather', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent);
            padding: 0.6rem 1rem;
            background: var(--surface);
            border-left: 4px solid var(--accent);
            border-radius: 0 6px 6px 0;
            margin: 2.5rem 0 1.2rem;
            letter-spacing: 0.01em;
        }

        /* Score summary */
        #score-summary {
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 1.2rem 1.5rem;
            text-align: center;
            margin-top: 1.5rem;
        }

        #score-summary p {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        #score-summary .reload-btn {
            display: inline-block;
            margin-top: 0.6rem;
            color: var(--accent2);
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.95rem;
        }

        /* Question card */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.3rem 1.4rem 1.1rem;
            margin-bottom: 1rem;
            transition: box-shadow 0.2s;
        }

        .q-card:hover {
            box-shadow: 0 2px 12px rgba(26, 92, 138, 0.08);
        }

        .q-text {
            font-family: 'Merriweather', serif;
            font-size: 0.97rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.9rem;
            line-height: 1.7;
        }

        .q-num {
            color: var(--accent);
            margin-right: 0.3rem;
        }

        /* Radio options (multiple choice) */
        .option-wrap {
            margin-top: 0.45rem;
        }

        .option-input {
            display: none;
        }

        .option-label {
            display: block;
            padding: 0.55rem 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.18s;
            font-size: 0.95rem;
            background: var(--bg);
        }

        .option-label:hover {
            border-color: var(--accent);
            background: #eaf2f9;
        }

        .option-input:checked+.option-label {
            background: #daeaf6;
            border-color: var(--accent);
        }

        .option-label.correct-ans {
            background: var(--green-bg) !important;
            border-color: var(--green-border) !important;
            color: var(--green);
        }

        .option-label.wrong-ans {
            background: var(--red-bg) !important;
            border-color: var(--red-border) !important;
            color: var(--red);
            text-decoration: line-through;
        }

        /* True/False options */
        .tf-options {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.45rem;
            flex-wrap: wrap;
        }

        .tf-input {
            display: none;
        }

        .tf-label {
            padding: 0.45rem 1.2rem;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.18s;
            background: var(--bg);
        }

        .tf-label:hover {
            border-color: var(--accent);
            background: #eaf2f9;
        }

        .tf-input:checked+.tf-label {
            background: #daeaf6;
            border-color: var(--accent);
            color: var(--accent);
        }

        .tf-label.correct-ans {
            background: var(--green-bg) !important;
            border-color: var(--green-border) !important;
            color: var(--green) !important;
        }

        .tf-label.wrong-ans {
            background: var(--red-bg) !important;
            border-color: var(--red-border) !important;
            color: var(--red) !important;
        }

        /* Sub-items for true/false questions */
        .sub-item {
            border-left: 3px solid var(--border);
            padding: 0.6rem 0.9rem 0.6rem 1rem;
            margin: 0.6rem 0;
            border-radius: 0 6px 6px 0;
            background: var(--surface2);
        }

        .sub-item-text {
            font-size: 0.93rem;
            margin-bottom: 0.4rem;
            font-style: italic;
            color: var(--text);
        }

        /* Table in question */
        .q-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.7rem 0 0.9rem;
            font-size: 0.88rem;
        }

        .q-table th {
            background: var(--accent);
            color: white;
            padding: 0.4rem 0.6rem;
            text-align: center;
            font-weight: 600;
        }

        .q-table td {
            border: 1px solid var(--border);
            padding: 0.35rem 0.6rem;
            text-align: center;
        }

        .q-table tr:nth-child(even) td {
            background: var(--surface2);
        }

        .q-table td:first-child {
            text-align: left;
            font-weight: 600;
        }

        /* Feedback */
        .feedback {
            margin-top: 0.7rem;
            font-size: 0.88rem;
            font-style: italic;
            padding: 0.4rem 0.7rem;
            border-radius: 5px;
        }

        .feedback.correct {
            background: var(--green-bg);
            color: var(--green);
            border-left: 3px solid var(--green-border);
        }

        .feedback.wrong {
            background: var(--red-bg);
            color: var(--red);
            border-left: 3px solid var(--red-border);
        }

        .feedback.skipped {
            background: var(--orange-bg);
            color: var(--orange);
            border-left: 3px solid var(--orange-border);
        }

        /* Submit button */
        .sticky-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            padding: 1.2rem;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        #submit-btn {
            pointer-events: all;
            background: var(--accent2);
            color: white;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            padding: 0.8rem 2.5rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(181, 64, 30, 0.35);
            transition: all 0.2s;
            letter-spacing: 0.03em;
        }

        #submit-btn:hover {
            background: #8f2e10;
            transform: translateY(-1px);
        }

        #submit-btn:active {
            transform: scale(0.97);
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 0.8rem 7rem;
            }

            .q-card {
                padding: 1rem 0.9rem 0.8rem;
                border-radius: 8px;
            }

            .q-text {
                font-size: 0.92rem;
            }

            .option-label,
            .tf-label {
                font-size: 0.88rem;
                padding: 0.5rem 0.7rem;
            }

            .section-title {
                font-size: 1rem;
            }

            .page-header h1 {
                font-size: 1.2rem;
            }

            #score-summary {
                padding: 1rem 0.8rem;
                margin-top: 1rem;
            }

            #score-summary p {
                font-size: 0.95rem;
            }

            .sticky-bar {
                padding: 1rem;
            }

            #submit-btn {
                padding: 0.7rem 2rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div class="page-header">
        <h1>BÀI KIỂM TRA ĐỊA LÍ 12</h1>
        <p>Đặc điểm kinh tế – xã hội các vùng kinh tế Việt Nam</p>
    </div>

    <div class="container">

        <div id="score-summary" style="display:none">
            <p>Kết quả: <span id="final-score-mc">0</span>/50 câu trắc nghiệm đúng &nbsp;|&nbsp; <span
                    id="final-score-tf">0</span>/40 ý đúng/sai &nbsp;|&nbsp; <span id="final-score-short">0</span>/10
                câu trả lời ngắn đúng</p>
            <button class="reload-btn" onclick="window.location.reload()">↺ Làm lại bài</button>
        </div>

        <!-- PHẦN 1: TRẮC NGHIỆM -->
        <div class="section-title">PHẦN I — TRẮC NGHIỆM (50 câu)</div>
        <form id="mc-form" class="space"></form>

        <!-- PHẦN 2: ĐÚNG SAI -->
        <div class="section-title">PHẦN II — ĐÚNG / SAI (10 câu × 4 ý)</div>
        <form id="tf-form" class="space"></form>

        <!-- PHẦN 3: TRẢ LỜI NGẮN -->
        <div class="section-title">PHẦN III — TRẢ LỜI NGẮN (10 câu)</div>
        <form id="short-form"></form>

    </div>

    <div class="sticky-bar">
        <button id="submit-btn" onclick="checkAll()">Nộp bài &amp; Xem kết quả</button>
    </div>

    <script>
        // ===================== DỮ LIỆU TRẮC NGHIỆM =====================
        const mcQuestions = [
            { q: "Loại đất chủ yếu ở dải đồng bằng ven biển Bắc Trung Bộ là", a: "Cát pha", o: ["Đất phèn", "Đất xám", "Cát pha", "Đất mặn"] },
            { q: "Vấn đề có ý nghĩa hàng đầu đối với việc khai thác thế mạnh ở vùng Bắc Trung Bộ là", a: "Phát triển ngành nông, lâm, thủy sản", o: ["Chuyển sang các công nghiệp lâu năm", "Trồng cây lương thực và cây thực phẩm", "Phát triển ngành nuôi trồng thuỷ sản", "Phát triển ngành nông, lâm, thủy sản"] },
            { q: "Bắc Trung Bộ không tiếp giáp với vùng kinh tế nào sau đây?", a: "Đông Nam Bộ", o: ["Trung du miền núi phía Bắc", "Đồng bằng sông Hồng", "Đông Nam Bộ", "Nam Trung Bộ"] },
            { q: "Khu vực đồi núi của Bắc Trung Bộ có thế mạnh trong việc", a: "Trồng cây công nghiệp lâu năm, cây ăn quả, chăn nuôi gia súc lớn và trồng rừng", o: ["Trồng cây công nghiệp hàng năm, cây dược liệu, trồng rừng và chăn nuôi lớn", "Trồng cây công nghiệp lâu năm, cây ăn quả, chăn nuôi gia súc lớn và trồng rừng", "Trồng rừng, trồng rau quả cận nhiệt và chăn nuôi gia súc nhỏ", "Trồng cây công nghiệp, cây rau đậu và chăn nuôi lớn"] },
            { q: "Đặc khu (Huyện đảo) nào sau đây thuộc Nam Trung Bộ?", a: "Phú Quý", o: ["Côn Đô", "Côn Đào", "Phú Quý", "Cổ Tô"] },
            { q: "Điều kiện sinh thái nông nghiệp nào sau đây không phải của Bắc Trung Bộ?", a: "Nhiều sông lớn, đồng bằng rộng", o: ["Nhiều sông lớn, đồng bằng rộng", "Đồng bằng hẹp, vùng đồi trước núi", "Đất phù sa, đất feralit và đất badan", "Thường xảy ra thiên tai, nạn cát bay"] },
            { q: "Thế mạnh để Bắc Trung Bộ phát triển khai thác hải sản là", a: "Vùng biển rộng, giàu nguồn lợi", o: ["Có mật độ sông ngòi khá cao", "Có một số nguồn nước khoáng", "Rừng tự nhiên có diện tích lớn", "Vùng biển rộng, giàu nguồn lợi"] },
            { q: "Thế mạnh để Bắc Trung Bộ phát triển nuôi trồng thuỷ hải sản là", a: "Bờ biển khúc khuỷu có đầm phá", o: ["Bờ biển khúc khuỷu có đầm phá", "Có một số nguồn nước khoáng", "Rừng tự nhiên có diện tích lớn", "Vùng biển rộng có nhiều bãi cá"] },
            { q: "Chuyên môn hóa sản xuất cây công nghiệp lâu năm ở Bắc Trung Bộ chủ yếu dựa vào điều kiện thuận lợi nào sau đây?", a: "Đất badan màu mỡ ở vùng đồi trước núi", o: ["Đất badan màu mỡ ở vùng đồi trước núi", "Đất cát pha ở các đồng bằng ven biển", "Dân có kinh nghiệm chinh phục tự nhiên", "Có một số cơ sở công nghiệp chế biến"] },
            { q: "Vai trò quan trọng của rừng đặc dụng ở Bắc Trung Bộ là", a: "Bảo tồn các loài sinh vật quý hiếm", o: ["Ngăn chặn nạn cát bay và cát chảy", "Cung cấp nhiều lâm sản có giá trị", "Hạn chế tác hại các cơn lũ đột ngột", "Bảo tồn các loài sinh vật quý hiếm"] },
            { q: "Trong tương lai, cảng biển nào sau đây ở Nam Trung Bộ sẽ là cảng trung chuyển quốc tế lớn nhất cả nước?", a: "Vân Phong", o: ["Đà Nẵng", "Dung Quất", "Quy Nhơn", "Vân Phong"] },
            { q: "Đông Nam Bộ dẫn đầu cả nước về diện tích gieo trồng cây công nghiệp nào sau đây?", a: "Cao su", o: ["Cao su", "Cà phê", "Dừa", "Chè"] },
            { q: "Công trình thủy lợi Dầu Tiếng thuộc tỉnh nào sau đây?", a: "Tây Ninh", o: ["Bình Dương", "Bình Phước", "Tây Ninh", "Đồng Nai"] },
            { q: "Nhà máy thủy điện nào sau đây có công suất lớn nhất Đông Nam Bộ?", a: "Trị An", o: ["Thác Mơ", "Cần Đơn", "Trị An", "Bà Rịa"] },

            { q: "Khu vực nào sau đây ở Đồng bằng sông Cửu Long tập trung nhiều than bùn nhất?", a: "U Minh", o: ["Kiên Giang", "Đồng Tháp Mười", "Tứ giác Long Xuyên", "U Minh"] },

        // ===================== DỮ LIỆU TRẢ LỜI NGẮN =====================

        // ===================== RENDER TRẮC NGHIỆM =====================
        function renderMC() {
            const form = document.getElementById('mc-form');
            mcQuestions.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'q-card';

                let optsHtml = '';
                item.o.forEach((opt, oIdx) => {
                    const id = `mc_${idx}_${oIdx}`;
                    optsHtml += `
                <div class="option-wrap">
                    <input type="radio" name="mc_${idx}" value="${opt}" id="${id}" class="option-input">
                    <label for="${id}" class="option-label">
                        <strong>${String.fromCharCode(65 + oIdx)}.</strong> ${opt}
                    </label>
                </div>`;
                });

                card.innerHTML = `
            <p class="q-text"><span class="q-num">Câu ${idx + 1}:</span> ${item.q}</p>
            <div>${optsHtml}</div>
            <div id="mc_fb_${idx}" style="display:none" class="feedback"></div>`;
                form.appendChild(card);
            });
        }

        // ===================== RENDER ĐÚNG SAI =====================
        function renderTF() {
            const form = document.getElementById('tf-form');
            tfQuestions.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = 'q-card';

                let tableHtml = '';
                if (q.table) {
                    const hdrs = q.table.headers.map(h => `<th>${h}</th>`).join('');
                    const rows = q.table.rows.map(r =>
                        `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`
                    ).join('');
                    tableHtml = `<table class="q-table"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`;
                }

                let contextHtml = q.context ? `<p style="font-size:0.9rem;font-style:italic;color:var(--text-muted);margin-bottom:0.7rem;background:var(--surface2);padding:0.5rem 0.8rem;border-radius:5px;">${q.context}</p>` : '';

                let itemsHtml = q.items.map((item, iIdx) => `
            <div class="sub-item">
                <p class="sub-item-text"><strong>${item.label})</strong> ${item.text}</p>
                <div class="tf-options">
                    <input type="radio" name="tf_${qIdx}_${iIdx}" value="true" id="tf_${qIdx}_${iIdx}_T" class="tf-input">
                    <label for="tf_${qIdx}_${iIdx}_T" class="tf-label">✓ Đúng</label>
                    <input type="radio" name="tf_${qIdx}_${iIdx}" value="false" id="tf_${qIdx}_${iIdx}_F" class="tf-input">
                    <label for="tf_${qIdx}_${iIdx}_F" class="tf-label">✗ Sai</label>
                </div>
                <div id="tf_fb_${qIdx}_${iIdx}" style="display:none" class="feedback"></div>
            </div>`).join('');

                card.innerHTML = `
            <p class="q-text">${q.q}</p>
            ${tableHtml}
            ${contextHtml}
            ${itemsHtml}`;
                form.appendChild(card);
            });
        }

        // ===================== RENDER TRẢ LỜI NGẮN =====================
        function renderShort() {
            const form = document.getElementById('short-form');

            shortQuestions.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'q-card';

                card.innerHTML = `
            <p class="q-text"><span class="q-num">Câu ${idx + 1}:</span> ${item.q}</p>
            <input type="number" step="any" id="short_${idx}" 
                style="width:100%;padding:0.6rem;border:1.5px solid var(--border);border-radius:6px;">
            <div id="short_fb_${idx}" class="feedback" style="display:none"></div>
        `;

                form.appendChild(card);
            });
        }

        // ===================== CHẤM BÀI =====================
        function checkAll() {
            let mcScore = 0;
            let tfScore = 0;

            // Chấm trắc nghiệm
            mcQuestions.forEach((item, idx) => {
                const selected = document.querySelector(`input[name="mc_${idx}"]:checked`);
                const fb = document.getElementById(`mc_fb_${idx}`);
                fb.style.display = 'block';

                // Reset all labels
                document.querySelectorAll(`input[name="mc_${idx}"] + label`).forEach(lbl => {
                    lbl.classList.remove('correct-ans', 'wrong-ans');
                });

                if (selected) {
                    if (selected.value === item.a) {
                        mcScore++;
                        fb.className = 'feedback correct';
                        fb.textContent = '✓ Chính xác!';
                    } else {
                        fb.className = 'feedback wrong';
                        fb.textContent = `✗ Chưa đúng. Đáp án: ${item.a}`;
                        selected.nextElementSibling.classList.add('wrong-ans');
                    }
                } else {
                    fb.className = 'feedback skipped';
                    fb.textContent = `— Chưa chọn. Đáp án: ${item.a}`;
                }

                // Highlight correct answer
                document.querySelectorAll(`input[name="mc_${idx}"]`).forEach(inp => {
                    if (inp.value === item.a) inp.nextElementSibling.classList.add('correct-ans');
                });
            });

            // Chấm đúng sai
            tfQuestions.forEach((q, qIdx) => {
                q.items.forEach((item, iIdx) => {
                    const selected = document.querySelector(`input[name="tf_${qIdx}_${iIdx}"]:checked`);
                    const fb = document.getElementById(`tf_fb_${qIdx}_${iIdx}`);
                    fb.style.display = 'block';

                    const trueLabel = document.querySelector(`label[for="tf_${qIdx}_${iIdx}_T"]`);
                    const falseLabel = document.querySelector(`label[for="tf_${qIdx}_${iIdx}_F"]`);
                    trueLabel.classList.remove('correct-ans', 'wrong-ans');
                    falseLabel.classList.remove('correct-ans', 'wrong-ans');

                    const correctLabel = item.answer ? trueLabel : falseLabel;
                    correctLabel.classList.add('correct-ans');

                    if (selected) {
                        const userAns = selected.value === 'true';
                        if (userAns === item.answer) {
                            tfScore++;
                            fb.className = 'feedback correct';
                            fb.textContent = '✓ Chính xác!';
                        } else {
                            fb.className = 'feedback wrong';
                            fb.textContent = `✗ Sai. Đáp án: ${item.answer ? 'Đúng' : 'Sai'}`;
                            const wrongLabel = item.answer ? falseLabel : trueLabel;
                            wrongLabel.classList.add('wrong-ans');
                        }
                    } else {
                        fb.className = 'feedback skipped';
                        fb.textContent = `— Chưa chọn. Đáp án: ${item.answer ? 'Đúng' : 'Sai'}`;
                    }
                });
            });
            // Chấm trả lời ngắn
            let shortScore = 0;

            shortQuestions.forEach((item, idx) => {
                const input = document.getElementById(`short_${idx}`);
                const fb = document.getElementById(`short_fb_${idx}`);
                fb.style.display = 'block';

                const userVal = parseFloat(input.value.replace(',', '.'));

                if (!isNaN(userVal)) {
                    // cho phép sai số nhỏ (0.1)
                    if (Math.abs(userVal - item.answer) <= 0.1) {
                        shortScore++;
                        fb.className = 'feedback correct';
                        fb.textContent = '✓ Chính xác!';
                    } else {
                        fb.className = 'feedback wrong';
                        fb.textContent = `✗ Sai. Đáp án: ${item.answer}`;
                    }
                } else {
                    fb.className = 'feedback skipped';
                    fb.textContent = `— Chưa nhập. Đáp án: ${item.answer}`;
                }
            });

            document.getElementById('final-score-mc').textContent = mcScore;
            document.getElementById('final-score-tf').textContent = tfScore;
            document.getElementById('final-score-short').textContent = shortScore;
            document.getElementById('score-summary').style.display = 'block';
            document.getElementById('submit-btn').textContent = '↻ Cập nhật kết quả';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderMC();
        renderTF();
        renderShort();
    </script>
