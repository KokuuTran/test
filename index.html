                    optionsHtml += `
                        <div class="mt-3">
                            <input type="radio" name="question${index}" value="${opt}" id="${id}" class="option-input hidden">
                            <label for="${id}" class="option-label block p-3 border rounded-lg cursor-pointer hover:bg-gray-50 border-gray-200">
                                <span class="font-semibold mr-2">${String.fromCharCode(65 + oIdx)}.</span> ${opt}
                            </label>
                        </div>
                    `;
                });

                qDiv.innerHTML = `
                    <p class="text-lg font-bold text-gray-700 mb-2">Câu ${index + 1}: ${item.q}</p>
                    <div class="options-container">${optionsHtml}</div>
                    <div id="feedback-${index}" class="mt-3 hidden italic text-sm"></div>
                `;
                form.appendChild(qDiv);
            });
        }

        function checkAnswers() {
            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="question${index}"]:checked`);
                const feedback = document.getElementById(`feedback-${index}`);
                feedback.classList.remove('hidden');
                
                const labels = document.querySelectorAll(`input[name="question${index}"] + label`);
                
                // Reset styles
                labels.forEach(label => {
                    label.classList.remove('bg-green-100', 'border-green-500', 'bg-red-100', 'border-red-500');
                });

                if (selected) {
                    if (selected.value === item.a) {
                        score++;
                        feedback.innerHTML = `<span class="text-green-600">Chính xác!</span>`;
                    } else {
                        feedback.innerHTML = `<span class="text-red-600">Chưa đúng. Đáp án là: ${item.a}</span>`;
                    }
                } else {
                    feedback.innerHTML = `<span class="text-orange-600">Bạn chưa chọn câu trả lời này. Đáp án là: ${item.a}</span>`;
                }

                // Highlight correct answer
                labels.forEach(label => {
                    if (label.innerText.includes(item.a)) {
                        label.classList.add('bg-green-100', 'border-green-500');
                    }
                });
            });

            document.getElementById('score-summary').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('submit-btn').innerText = "Cập nhật kết quả";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
